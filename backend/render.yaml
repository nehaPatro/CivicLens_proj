services:
  - type: web
    name: civiclens-backend
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: civiclens
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: POTHOLE_MODEL_PATH
        value: models_ai/pothole.pt
      - key: FLOOD_MODEL_PATH
        value: models_ai/flood.pt
      - key: YOLO_CONFIDENCE_THRESHOLD
        value: "0.35"
    disk:
      name: civiclens-uploads
      mountPath: /app/uploads
      sizeGB: 1
